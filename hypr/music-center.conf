# Automatically put Spotify in music center
windowrule {
  name = windowrule-7
  workspace = special:musiccenter
  match:class = ^([Ss])potify$
}

# Control center Workspace
bind = $mainMod, D, togglespecialworkspace, musiccenter
bind = $mainMod SHIFT, D, movetoworkspace, special:musiccenter

# Workspace style
workspace = special:musiccenter, gapsout:60, gapsin:60
